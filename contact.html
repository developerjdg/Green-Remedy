<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Remedy - Contact</title>
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
        integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div id="navbar-container"></div>
    <!-- ===== AGEGATE ===== -->
    <section id="agegate"></section>

    <section class="contact-banner">
        <div class="contact-banner-inner">
            <h1 class="contact-title">Contact Us - Green Remedy</h1>
        </div>
    </section>
    <section class="contact-main">
        <div class="inner-contact-main">
            <div class="contact-from">
                <div class="inner-contact-from">
                    <div class="left">
                        <h2>GET IN TOUCH</h2>
                        <div class="details">
                            <p>TELEPHONE:</p>
                            <a href="#">+1 510-758-7898</a>
                        </div>
                        <div class="details">
                            <p>Email:</p>
                            <a href="#">info@greenremedy.net</a>
                        </div>
                        <div class="details">
                            <p>ADDRESS:</p>
                            <a href="#">2928 Hilltop Mall Rd, Unit C,<br>Richmond, CA 84806</a>
                        </div>
                        <a href="#">Get Directions</a>
                    </div>
                    <div class="right">
                        <h2>Have A Question?</h2>
                        <div class="main-form">
                            <form action="" method="POST" id="contactForm">
                                <input type="text" name="name" placeholder="Name" id="name">
                                <span class="error"></span>
                                <input type="email" name="email" placeholder="Email" id="email">
                                <span class="error"></span>
                                <textarea name="message" placeholder="Message" id="message"></textarea>
                                <span class="error"></span>
                                <button type="submit" id="submitBtn">Submit</button>
                                
                            </form>
                            <P>This Site Is Protected By ReCAPTCHA And The Google PrivacyPolicy and Terms of Service Apply.</P>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section id="follow"></section>
    <section id="footer-container"></section>
    <script>
        fetch('navbar.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;

                initMobileMenu();
            });
        fetch('slider.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('follow').innerHTML = data;
                initSlider();
            });
        fetch('footer.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
    <script src="script/navabar.js"></script>
    <script src="script/agegate.js"></script>
    <script src="script/slider.js"></script>
    <script src="script/contact-form.js"></script>
</body>

</html>

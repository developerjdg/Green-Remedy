<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs - Green Remedy</title>

    <link rel="stylesheet" href="css/jobs.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
        integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="navbar-container"></div>

    <!-- ===== AGE GATE ===== -->
    <section id="agegate"></section>

    <!-- ===== BANNER ===== -->

    <section class="tour-banner">
        <div class="tour-banner-inner">
            <h1 class="tour-title">
                Join the Green Remedy Team – Careers in Cannabis
            </h1>
        </div>
    </section>

    <!-- ===== JOB FORM ===== -->

    <section class="jobs-main">

        <div class="jobs-container">

            <div class="jobs-form">

                <h2>Employment Application</h2>

                <form id="jobForm" action="#" method="POST" enctype="multipart/form-data">

                    <div class="form-grid">

                        <!-- First Name -->

                        <div class="form-group">
                            <label>First Name <span>*</span></label>

                            <input
                                type="text"
                                id="firstName"
                                name="firstName"
                                placeholder="First Name">

                            <span class="error"></span>
                        </div>

                        <!-- Last Name -->

                        <div class="form-group">
                            <label>Last Name <span>*</span></label>

                            <input
                                type="text"
                                id="lastName"
                                name="lastName"
                                placeholder="Last Name">

                            <span class="error"></span>
                        </div>

                        <!-- Phone -->

                        <div class="form-group">
                            <label>Phone <span>*</span></label>

                            <input
                                type="tel"
                                id="phone"
                                name="phone"
                                placeholder="Phone Number">

                            <span class="error"></span>
                        </div>

                        <!-- Email -->

                        <div class="form-group">
                            <label>Email <span>*</span></label>

                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Email Address">

                            <span class="error"></span>
                        </div>

                        <!-- Resume -->

                        <div class="form-group">

                            <label>Resume <span>*</span></label>

                            <input
                                type="file"
                                id="resume"
                                name="resume"
                                accept=".pdf,.doc,.docx">

                            <small>Please upload your resume in PDF or Word format.</small>

                            <span class="error"></span>

                        </div>

                        <!-- Position -->

                        <div class="form-group">

                            <label>What type of position are you interested in? <span>*</span></label>

                            <input
                                type="text"
                                id="position"
                                name="position"
                                placeholder="Budtender, Manager, etc.">

                            <span class="error"></span>

                        </div>

                    </div>

                    <!-- Skills -->

                    <div class="form-group full-width">

                        <label>
                            Skills & Qualifications
                        </label>

                        <p class="skills-text">
                            Please list qualifications such as special skills,
                            abilities, or honors that should be considered:
                        </p>

                        <textarea
                            id="skills"
                            name="skills"
                            rows="5"
                            placeholder="Write here..."></textarea>

                        <span class="error"></span>

                    </div>

                    <button type="submit">
                        Submit
                    </button>

                </form>

            </div>

        </div>

    </section>

    <section id="follow"></section>

    <section id="footer-container"></section>

    <script>
        fetch('navbar.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                initMobileMenu();
            });

        fetch('slider.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('follow').innerHTML = data;
                initSlider();
            });

        fetch('footer.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>

    <script src="script/navabar.js"></script>
    <script src="script/agegate.js"></script>
    <script src="script/slider.js"></script>
    <script src="script/jobs.js"></script>

</body>

</html>
